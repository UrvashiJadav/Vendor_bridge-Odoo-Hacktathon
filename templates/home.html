<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: #eaf4f4;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
    width:320px;
}

h1{
    color:#598392;
    font-size:20px;
}

p{
    color:#666;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#598392;
    color:white;
}

button:hover{
    background:#5ca4a9;
}

</style>
</head>

<body>

<div class="card">

    <h1 id="msg">Loading...</h1>
    <p>Dashboard Home Page</p>

    <button onclick="logout()">Logout</button>

</div>

<script>

let username = localStorage.getItem("username");

if(!username){
    window.location.href = "/login";
}

document.getElementById("msg").innerText = "Welcome, " + username;

function logout(){

    console.log("logout clicked");

    localStorage.removeItem("username");
    localStorage.removeItem("email");

    window.location.href = "/login";
}

</script>

</body>
</html>
