<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Quotation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    linear-gradient(
        135deg,
        #f5f7fa 0%,
        #d2edf9 50%,
        #b5e2fa 100%
    );

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.box{
    background:white;
    width:100%;
    max-width:550px;

    border-radius:24px;

    padding:35px;

    box-shadow:
    0 20px 50px rgba(
        3,
        4,
        94,
        0.08
    );
}

h1{
    color:#03045e;
    margin-bottom:10px;
    font-size:32px;
}

.sub{
    color:#64748b;
    margin-bottom:25px;
}

.field{
    display:flex;
    flex-direction:column;
    margin-bottom:18px;
}

.field label{
    font-size:14px;
    font-weight:600;
    color:#03045e;
    margin-bottom:8px;
}

.field input,
.field textarea{
    padding:14px;
    border-radius:12px;
    border:1.5px solid #dbeafe;
    outline:none;
    font-size:14px;
    background:#f8fafc;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    border:none;
    cursor:pointer;

    background:
    linear-gradient(
        135deg,
        #0077b6 0%,
        #054a91 50%,
        #03045e 100%
    );

    color:white;
    padding:15px;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
}

#result{
    text-align:center;
    margin-top:15px;
    font-weight:600;
}

</style>
</head>

<body>

<div class="box">

    <h1>Submit Quotation</h1>
    <p class="sub">
        Fill quotation details
    </p>

    <div class="field">
        <label>RFQ ID</label>
        <input
        type="number"
        id="rfqid">
    </div>

    <div class="field">
        <label>Vendor ID</label>
        <input
        type="number"
        id="vendorid">
    </div>

    <div class="field">
        <label>Price</label>
        <input
        type="number"
        id="priceid">
    </div>

    <div class="field">
        <label>Delivery Days</label>
        <input
        type="number"
        id="deliveryid">
    </div>

    <div class="field">
        <label>Comments</label>
        <textarea
        id="commentsid"></textarea>
    </div>

    <button onclick="submitQuotation()">
        Submit Quotation
    </button>

    <p id="result"></p>

</div>

<script>

async function submitQuotation(){

    let rfq_id =
    document.getElementById(
        "rfqid"
    ).value;

    let vendor_id =
    document.getElementById(
        "vendorid"
    ).value;

    let price =
    document.getElementById(
        "priceid"
    ).value;

    let delivery_days =
    document.getElementById(
        "deliveryid"
    ).value;

    let comments =
    document.getElementById(
        "commentsid"
    ).value;

    let response =
    await fetch(
        "http://127.0.0.1:5000/submit-quotation",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({
                rfq_id,
                vendor_id,
                price,
                delivery_days,
                comments
            })
        }
    );

    let data =
    await response.json();

    let result =
    document.getElementById(
        "result"
    );

    result.innerText =
    data.message;

    result.style.color =
    "green";
}

</script>

</body>
</html>
