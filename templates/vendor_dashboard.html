<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendor Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: 'Inter', sans-serif;
    background:
    linear-gradient(
        135deg,
        #f5f7fa 0%,
        #d2edf9 50%,
        #b5e2fa 100%
    );

    min-height: 100vh;
    padding: 40px;
}

.header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
}

.title h1{
    color: #03045e;
    font-size: 34px;
    font-weight: 800;
}

.title p{
    color: #64748b;
    margin-top: 5px;
    font-size: 15px;
}

.logout-btn{
    background:
    linear-gradient(
        135deg,
        #0077b6 0%,
        #03045e 100%
    );

    color: white;
    border: none;
    padding: 13px 24px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;

    box-shadow:
    0 8px 20px rgba(
        3,
        4,
        94,
        0.15
    );
}

.cards{
    display: grid;
    grid-template-columns:
    repeat(
        auto-fit,
        minmax(
            250px,
            1fr
        )
    );

    gap: 22px;
    margin-bottom: 40px;
}

.card{
    background: white;
    border-radius: 22px;
    padding: 28px;

    box-shadow:
    0 20px 50px rgba(
        3,
        4,
        94,
        0.05
    );

    border: 1px solid rgba(
        181,
        226,
        250,
        0.35
    );
}

.card h3{
    color: #64748b;
    font-size: 15px;
    margin-bottom: 14px;
}

.card p{
    color: #03045e;
    font-size: 34px;
    font-weight: 800;
}

.quick-actions{
    background: white;
    border-radius: 22px;
    padding: 30px;

    box-shadow:
    0 20px 50px rgba(
        3,
        4,
        94,
        0.05
    );
}

.quick-actions h2{
    color: #03045e;
    margin-bottom: 20px;
}

.buttons{
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
}

button{
    border: none;
    cursor: pointer;

    background:
    linear-gradient(
        135deg,
        #0077b6 0%,
        #054a91 50%,
        #03045e 100%
    );

    color: white;
    padding: 15px 24px;
    border-radius: 14px;

    font-size: 14px;
    font-weight: 600;

    transition: 0.25s ease;

    box-shadow:
    0 4px 14px rgba(
        3,
        4,
        94,
        0.15
    );
}

button:hover{
    transform:
    translateY(-2px);
}

.section-title{
    color: #03045e;
    margin-bottom: 20px;
}

.activity-box{
    margin-top: 35px;
    background: white;
    border-radius: 22px;
    padding: 30px;

    box-shadow:
    0 20px 50px rgba(
        3,
        4,
        94,
        0.05
    );
}

.activity-item{
    background: #f8fafc;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 12px;
    border: 1px solid #e2e8f0;
}

.activity-item h4{
    color: #03045e;
    margin-bottom: 5px;
}

.activity-item p{
    color: #64748b;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="header">

    <div class="title">
        <h1>Vendor Dashboard</h1>
        <p>Manage RFQs and quotations</p>
    </div>

    <button class="logout-btn">
        Logout
    </button>

</div>


<div class="cards">

    <div class="card">
        <h3>Assigned RFQs</h3>
        <p>5</p>
    </div>

    <div class="card">
        <h3>Submitted Quotations</h3>
        <p>2</p>
    </div>

    <div class="card">
        <h3>Pending Quotations</h3>
        <p>3</p>
    </div>

</div>


<div class="quick-actions">

    <h2>Quick Actions</h2>

    <div class="buttons">

        <button
        onclick="window.location.href='/vendor-rfqs'">
            View RFQs
        </button>

        <button
        onclick="window.location.href='/my-quotations'">
            My Quotations
        </button>

    </div>

</div>


<div class="activity-box">

    <h2 class="section-title">
        Recent Activity
    </h2>

    <div class="activity-item">
        <h4>Laptop RFQ</h4>
        <p>Quotation submitted successfully</p>
    </div>

    <div class="activity-item">
        <h4>Office Chairs RFQ</h4>
        <p>Awaiting response</p>
    </div>

</div>

</body>
</html>
