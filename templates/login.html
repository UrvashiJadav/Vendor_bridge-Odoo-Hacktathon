<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
    background: linear-gradient(135deg, #f5f7fa 0%, #d2edf9 50%, #b5e2fa 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Inter', sans-serif;
}

.box {
    background: #ffffff;
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 30px 70px rgba(3, 4, 94, 0.07);
    border: 1px solid rgba(181, 226, 250, 0.35);
}

h1 {
    font-size: 30px;
    font-weight: 800;
    color: #03045e;
}

.sub {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 24px;
}

.field {
    margin-bottom: 18px;
}

.field label {
    font-size: 13px;
    font-weight: 600;
    color: #03045e;
    display: block;
    margin-bottom: 6px;
}

.field input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1.5px solid #e2e8f0;
    background: #f8fafc;
    font-size: 14px;
    outline: none;
}

.field input:focus {
    border-color: #0077b6;
    box-shadow: 0 0 0 4px rgba(0,119,182,0.14);
    background: #fff;
}

button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #0077b6, #054a91, #03045e);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    opacity: 0.95;
}

#result {
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
}

.footer {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
}
.footer a {
    color: #0077b6;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="box">

    <h1>Welcome Back</h1>
    <p class="sub">Sign in to continue</p>

    <div class="field">
        <label>Username</label>
        <input type="text" id="usernameid" placeholder="Enter username">
    </div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="emailid" placeholder="Enter email">
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="passwordid" placeholder="Enter password">
    </div>

    <button onclick="loginUser()">Sign In</button>

    <p id="result"></p>

    <p class="footer">
        New user? <a href="/">Create Account</a>
    </p>

</div>

<script>

async function loginUser(){

    let username = document.getElementById("usernameid").value;
    let email = document.getElementById("emailid").value;
    let password = document.getElementById("passwordid").value;
    let result = document.getElementById("result");

    if(!username || !email || !password){
        result.innerText = "Please fill all fields";
        result.style.color = "red";
        return;
    }

    try {
        let response = await fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                email,
                password
            })
        });

        let data = await response.json();

        if (data.status === "success") {

            // ✅ STORE DATA PROPERLY
            localStorage.setItem("username", data.username || "");
            localStorage.setItem("user_id", data.user_id || "");
            localStorage.setItem("role", data.role || "");

            const role = (data.role || "").toLowerCase();

            // 🔥 ROLE ROUTING FIXED
            if (role === "admin") {
                window.location.href = "/admin";
            }
            else if (role === "vendor") {
                window.location.href = "/vendor-dashboard";
            }
            else if (role === "manager") {
                window.location.href = "/manager";
            }
            else {
                result.innerText = "Unknown role: " + data.role;
                result.style.color = "red";
            }

        }
        else {
            result.innerText = data.message || "Login failed";
            result.style.color = "red";
        }

    } catch (error) {
        console.log(error);
        result.innerText = "Server not reachable";
        result.style.color = "red";
    }
}

</script>

</body>
</html>
