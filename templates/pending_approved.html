<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Approvals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    background: linear-gradient(135deg, #f5f7fa 0%, #d2edf9 50%, #b5e2fa 100%);
    background-attachment: fixed;
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background: linear-gradient(180deg, #0077b6 0%, #054a91 50%, #03045e 100%);
    color:white;
    padding:30px 20px;
    box-shadow: 4px 0 25px rgba(3, 4, 94, 0.05);
}

.logo{
    font-size:22px;
    font-weight:800;
    color:white;
    margin-bottom:35px;
    letter-spacing: 0.5px;
    padding-left: 10px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.menu a{
    text-decoration:none;
    color: #e2e8f0;
    padding:14px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius:12px;
    transition: all 0.25s ease;
}

.menu a:hover{
    background:rgba(255,255,255,0.15);
    color:white;
    padding-left: 20px;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
    overflow-y: auto;
}

.topbar{
    background: #ffffff;
    border-radius:18px;
    padding:18px 25px;
    box-shadow: 0 20px 40px rgba(3, 4, 94, 0.03);
    border: 1px solid rgba(181, 226, 250, 0.35);
    margin-bottom:25px;
}

.topbar h2{
    color:#03045e;
    font-weight: 800;
    font-size: 24px;
}

/* TABLE CONTAINER */
.table-card{
    background: #ffffff;
    border-radius:18px;
    overflow:hidden;
    box-shadow: 0 20px 40px rgba(3, 4, 94, 0.03);
    border: 1px solid rgba(181, 226, 250, 0.35);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background: #f8fafc;
    color: #03045e;
    font-weight: 700;
    text-align:left;
    padding:16px 20px;
    font-size: 14px;
    border-bottom: 2px solid #e2e8f0;
}

td{
    padding:16px 20px;
    border-bottom:1px solid #edf2f7;
    color: #475569;
    font-size: 14px;
    vertical-align: middle;
}

tr:last-child td {
    border-bottom: none;
}

.status{
    color:#d97706;
    font-weight:600;
    background: #fef3c7;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-block;
}

/* BUTTONS */
.btn{
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size: 13px;
    margin-right:5px;
    transition: all 0.2s ease;
}

.view-btn{
    background: linear-gradient(135deg, #0077b6 0%, #03045e 100%);
    color:white;
    box-shadow: 0 4px 10px rgba(3, 4, 94, 0.15);
}

.view-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.approve-btn{
    background: transparent;
    border: 1px solid #22c55e;
    color: #22c55e;
}

.approve-btn:hover{
    background: #22c55e;
    color: white;
}

.reject-btn{
    background: transparent;
    border: 1px solid #ef4444;
    color: #ef4444;
}

.reject-btn:hover{
    background: #ef4444;
    color: white;
}

.result{
    margin-top:24px;
    font-weight:700;
    font-size: 15px;
    color:#03045e;
}

.loading{
    padding:25px;
    color:#64748b;
    text-align: center;
    font-weight: 500;
}

@media(max-width:900px){
    body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">Manager Panel</div>
    <div class="menu">
        <a href="/manager">Dashboard</a>
        <a href="/pending-approvals">Pending Approvals</a>
        <a href="/approved-vendors">Approved Vendors</a>
        <a href="/rejected-vendors">Rejected Vendors</a>
        <a href="/analytics">Analytics</a>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <h2>Pending Vendor Approvals</h2>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Vendor</th>
                    <th>Company</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="5" class="loading">Loading pending requests...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="result" class="result"></div>
</div>

<script>
loadPendingVendors();

async function loadPendingVendors(){
    try{
        let response = await fetch("/get-pending-vendors");
        let data = await response.json();
        let rows = "";

        if(data.length === 0){
            rows = `<tr><td colspan="5" class="loading">No pending vendors found.</td></tr>`;
        }

        data.forEach(vendor => {
            rows += `
            <tr>
                <td>${vendor.vendor}</td>
                <td>${vendor.company}</td>
                <td>${vendor.category}</td>
                <td><span class="status">${vendor.status}</span></td>
                <td>
                    <button class="btn view-btn" onclick="viewVendor(${vendor.id})">
                        View
                    </button>
                    <button class="btn approve-btn" onclick="approveVendor(${vendor.id})">
                        Approve
                    </button>
                    <button class="btn reject-btn" onclick="rejectVendor(${vendor.id})">
                        Reject
                    </button>
                </td>
            </tr>
            `;
        });

        document.getElementById("tableBody").innerHTML = rows;
    }
    catch(error){
        document.getElementById("result").innerText = "❌ Unable to load vendors";
    }
}

/* VIEW */
function viewVendor(id){
    window.location.href = "/vendor-details?id=" + id;
}

/* APPROVE */
async function approveVendor(id){
    let response = await fetch("/approve-vendor", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({ id })
    });

    let data = await response.json();
    document.getElementById("result").innerText = "✅ " + data.message;
    loadPendingVendors();
}

/* REJECT */
async function rejectVendor(id){
    let response = await fetch("/reject-vendor", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({ id })
    });

    let data = await response.json();
    document.getElementById("result").innerText = "❌ " + data.message;
    loadPendingVendors();
}
</script>

</body>
</html>
