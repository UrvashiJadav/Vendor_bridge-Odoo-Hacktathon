<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    display:flex;
    min-height:100vh;
    background: linear-gradient(135deg, #f5f7fa 0%, #d2edf9 50%, #b5e2fa 100%);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background: linear-gradient(180deg,#0077b6,#054a91,#03045e);
    color:white;
    padding:25px;
    box-shadow:4px 0 20px rgba(0,0,0,0.1);
}

.sidebar h2{
    font-size:22px;
    font-weight:800;
    margin-bottom:35px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu a{
    color:#e2e8f0;
    text-decoration:none;
    padding:14px 16px;
    border-radius:12px;
    transition:.3s;
    font-weight:500;
}

.menu a:hover{
    background:rgba(255,255,255,0.15);
    color:white;
    transform:translateX(5px);
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

/* TOPBAR */
.topbar{
    background:white;
    padding:18px 25px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.topbar div{
    font-size:18px;
    color:#1e293b;
    font-weight:500;
}

/* LOGOUT */
.topbar button{
    background:transparent;
    border:1px solid #ef4444;
    color:#ef4444;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.topbar button:hover{
    background:#ef4444;
    color:white;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    border:1px solid #e2e8f0;
}

.card h3{
    color:#64748b;
    font-size:14px;
    font-weight:600;
}

.card h1{
    margin-top:12px;
    font-size:32px;
    color:#0f172a;
}

/* FORM */
h2{
    margin-bottom:18px;
    color:#0f172a;
    font-size:22px;
    font-weight:800;
}

.form-container{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    border:1px solid #e2e8f0;
}

input, select{
    width:100%;
    padding:13px 15px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    background:#f8fafc;
    font-size:14px;
    margin-bottom:15px;
    outline:none;
}

input:focus, select:focus{
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

/* BUTTON */
button{
    background:linear-gradient(135deg,#0077b6,#054a91,#03045e);
    color:white;
    border:none;
    padding:13px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    width:100%;
}

button:hover{
    opacity:0.95;
}

/* RESULT */
#createResult{
    margin-top:15px;
    font-weight:600;
    color:#2563eb;
}

/* RESPONSIVE */
@media(max-width:900px){
    body{flex-direction:column;}
    .sidebar{width:100%;}
    .main{padding:20px;}
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin Panel</h2>
    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Orders</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <div>Welcome, <b id="adminName">Admin</b></div>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Users</h3>
            <h1 id="usersCount">0</h1>
        </div>

        <div class="card">
            <h3>Total Orders</h3>
            <h1 id="ordersCount">0</h1>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h1>₹0</h1>
        </div>
    </div>

    <!-- CREATE EMPLOYEE -->
    <h2>Create Employee</h2>

    <div class="form-container">

        <input type="text" id="empName" placeholder="Full Name">
        <input type="text" id="empUsername" placeholder="Username">
        <input type="email" id="empEmail" placeholder="Email">
        <input type="password" id="empPassword" placeholder="Password">

        <select id="empRole">
            <option value="manager">Manager</option>
            <option value="procurement">Procurement</option>
        </select>

        <button onclick="createEmployee()">Create Employee</button>
        <p id="createResult"></p>

    </div>

</div>

<script>

// admin name
let admin = localStorage.getItem("username") || localStorage.getItem("admin");

if(admin){
    document.getElementById("adminName").innerText = admin;
}

// fake stats
document.getElementById("usersCount").innerText = 120;
document.getElementById("ordersCount").innerText = 45;

// logout fix
function logout(){
    localStorage.removeItem("username");
    localStorage.removeItem("admin");
    window.location.href = "/login";
}

// create employee
async function createEmployee(){

    let name = document.getElementById("empName").value;
    let username = document.getElementById("empUsername").value;
    let email = document.getElementById("empEmail").value;
    let password = document.getElementById("empPassword").value;
    let role = document.getElementById("empRole").value;

    let response = await fetch("http://127.0.0.1:5000/create-employee", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ name, username, email, password, role })
    });

    let data = await response.json();
    document.getElementById("createResult").innerText = data.message;
}

</script>

</body>
</html>
