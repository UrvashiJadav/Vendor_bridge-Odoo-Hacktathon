<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    display:flex;
    min-height:100vh;
    background:#f1f5f9;
}

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    padding:25px;
    box-shadow:4px 0 20px rgba(0,0,0,0.08);
}

.sidebar h2{
    font-size:24px;
    font-weight:700;
    margin-bottom:35px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu a{
    color:#cbd5e1;
    text-decoration:none;
    padding:14px 16px;
    border-radius:12px;
    transition:.3s;
    font-weight:500;
}

.menu a:hover{
    background:rgba(255,255,255,0.08);
    color:white;
    transform:translateX(5px);
}

.main{
    flex:1;
    padding:30px;
}

.topbar{
    background:white;
    padding:18px 25px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(15,23,42,.05);
}

.topbar div{
    font-size:18px;
    color:#1e293b;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(15,23,42,.05);
    border:1px solid #e2e8f0;
}

.card h3{
    color:#64748b;
    font-size:14px;
    font-weight:600;
}

.card h1{
    margin-top:12px;
    font-size:32px;
    color:#0f172a;
}

h2{
    margin-bottom:18px;
    color:#0f172a;
    font-size:24px;
}

input,
select{
    width:100%;
    padding:13px 15px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    background:#f8fafc;
    font-size:14px;
    outline:none;
    transition:.3s;
}

input:focus,
select:focus{
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

button{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    border:none;
    padding:13px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(37,99,235,.25);
}

.topbar button{
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

.topbar button:hover{
    box-shadow:0 10px 20px rgba(239,68,68,.25);
}

#createResult{
    margin-top:15px;
    font-weight:600;
    color:#2563eb;
}

.card input,
.card select{
    margin-bottom:12px;
}

@media(max-width:900px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .main{
        padding:20px;
    }

    .cards{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Admin Panel</h2>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Orders</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <div>
            Welcome, <b id="adminName">Admin</b>
        </div>

        <button onclick="logout()">Logout</button>
    </div>

    <div class="cards">

        <div class="card">
            <h3>Total Users</h3>
            <h1 id="usersCount">0</h1>
        </div>

        <div class="card">
            <h3>Total Orders</h3>
            <h1 id="ordersCount">0</h1>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h1>₹0</h1>
        </div>

    </div>

    <br> 
    <br>
<h2>Create Employee</h2>

<div class="card">

    <input type="text"
           id="empName"
           placeholder="Full Name">

    <br><br>

    <input type="text"
           id="empUsername"
           placeholder="Username">

    <br><br>

    <input type="email"
           id="empEmail"
           placeholder="Email">

    <br><br>

    <input type="password"
           id="empPassword"
           placeholder="Password">

    <br><br>

    <select id="empRole">

        <option value="manager">
            Manager
        </option>

        <option value="procurement">
            Procurement
        </option>

    </select>

    <br><br>

    <button onclick="createEmployee()">
        Create Employee
    </button>

    <p id="createResult"></p>

</div>

</div>



<script>

let admin = localStorage.getItem("admin");

if(admin){
    document.getElementById("adminName").innerText = admin;
}

document.getElementById("usersCount").innerText = 120;
document.getElementById("ordersCount").innerText = 45;

function logout(){
    localStorage.removeItem("admin");
    alert("Logged out");
    window.location.href = "/login";
}


async function createEmployee(){

    let name =
        document.getElementById("empName").value;

    let username =
        document.getElementById("empUsername").value;

    let email =
        document.getElementById("empEmail").value;

    let password =
        document.getElementById("empPassword").value;

    let role =
        document.getElementById("empRole").value;

    let response =
        await fetch(
            "http://127.0.0.1:5000/create-employee",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    name,
                    username,
                    email,
                    password,
                    role
                })
            }
        );

    let data = await response.json();

    document.getElementById(
        "createResult"
    ).innerText = data.message;
}


</script>

</body>
</html>
