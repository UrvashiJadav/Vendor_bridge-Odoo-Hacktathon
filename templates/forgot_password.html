<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
    background: linear-gradient(135deg, #f5f7fa 0%, #b5e2fa 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

.box {
    background: #ffffff;
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    box-sizing: border-box;
    box-shadow: 0 30px 70px rgba(3, 4, 94, 0.07),
                0 10px 24px rgba(3, 4, 94, 0.03),
                0 1px 3px rgba(0, 0, 0, 0.02);
    border: 1px solid rgba(181, 226, 250, 0.35);
}

h1 {
    font-size: 30px;
    font-weight: 800;
    color: #03045e;
    margin: 0 0 6px;
}

.sub {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 24px;
}

.field {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
}

.field label {
    font-size: 13px;
    font-weight: 600;
    color: #03045e;
    margin-bottom: 6px;
}

.field input {
    width: 100%;
    box-sizing: border-box;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 14px;
    color: #03045e;
    outline: none;
    font-weight: 500;
    transition: all 0.25s ease;
}

.field input:disabled {
    background: #f1f5f9;
    color: #94a3b8;
    cursor: not-allowed;
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #0077b6 0%, #03045e 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

button:disabled {
    background: #e2e8f0;
    color: #94a3b8;
    cursor: not-allowed;
}

.secondary-btn {
    background: #ffffff;
    color: #0077b6;
    border: 1.5px solid #0077b6;
    margin-top: 12px;
}

#result {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
}

.box::before {
    content: "Security Portal";
    display: block;
    width: max-content;
    color: #0077b6;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 14px;
    background: rgba(0, 119, 182, 0.06);
    padding: 5px 10px;
    border-radius: 6px;
}

.footer {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-top: 24px;
}

.footer a {
    color: #0077b6;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="box">

    <h1>Reset Password</h1>
    <p class="sub">Recover your account using OTP verification</p>

    <div class="field">
        <label>Email Address</label>
        <input type="email" id="emailid" placeholder="Enter registered email">
    </div>

    <button onclick="sendOTP()">Send OTP</button>

    <div class="field" style="margin-top:20px;">
        <label>OTP</label>
        <input type="text" id="otpid" placeholder="Enter OTP">
    </div>

    <button class="secondary-btn" onclick="verifyOTP()">Verify OTP</button>

    <div class="field" style="margin-top:20px;">
        <label>New Password</label>
        <input type="password" id="newpasswordid" disabled>
    </div>

    <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmpasswordid" disabled>
    </div>

    <button onclick="resetPassword()" id="resetBtn" disabled>
        Reset Password
    </button>

    <p id="result"></p>

    <p class="footer">
        Remember password?
        <a href="/login">Back to Login</a>
    </p>

</div>

<script>

let otpVerified = false;

async function sendOTP(){

    let email = document.getElementById("emailid").value;

    let response = await fetch("/send-otp",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({ email })
    });

    let data = await response.json();

    let resultElement = document.getElementById("result");
    resultElement.innerText = data.message;
}

async function verifyOTP(){

    let email = document.getElementById("emailid").value;
    let otp = document.getElementById("otpid").value;

    let response = await fetch("/verify-otp",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({ email, otp })
    });

    let data = await response.json();
    let resultElement = document.getElementById("result");

    if(data.status === "success"){

        otpVerified = true;

        document.getElementById("newpasswordid").disabled = false;
        document.getElementById("confirmpasswordid").disabled = false;
        document.getElementById("resetBtn").disabled = false;

        resultElement.innerText = "OTP Verified Successfully";
        resultElement.style.color = "green";
    }
    else{
        resultElement.innerText = data.message;
        resultElement.style.color = "red";
    }
}

async function resetPassword(){

    if(!otpVerified) return;

    let email = document.getElementById("emailid").value;
    let newPassword = document.getElementById("newpasswordid").value.trim();
    let confirmPassword = document.getElementById("confirmpasswordid").value.trim();

    let resultElement = document.getElementById("result");

    if(newPassword === "" || confirmPassword === ""){
        resultElement.innerText = "Please enter a valid new password.";
        resultElement.style.color = "red";
        return;
    }

    if(newPassword !== confirmPassword){
        resultElement.innerText = "Passwords do not match";
        resultElement.style.color = "red";
        return;
    }

    let response = await fetch("/reset-password",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email,
            password:newPassword
        })
    });

    let data = await response.json();

    if(data.status === "success"){
        alert("Password Updated Successfully");
        window.location.href = "/login";
    }
    else{
        resultElement.innerText = data.message;
        resultElement.style.color = "red";
    }
}

</script>

</body>
</html>
